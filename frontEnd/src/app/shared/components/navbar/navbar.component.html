<nav class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <div class="flex">
        <!-- Logo -->
        <div class="flex-shrink-0 flex items-center">
          <span class="text-2xl font-black bg-gradient-to-r from-blue-600 to-indigo-700 bg-clip-text text-transparent">RestTime</span>
        </div>
        
        <!-- Navigation Links -->
        <div class="hidden sm:ml-8 sm:flex sm:space-x-8">
          @for (item of menuItems; track item.route) {
            <a [routerLink]="item.route"
               routerLinkActive="border-blue-500 text-gray-900"
               [routerLinkActiveOptions]="{exact: item.route === '/employe/dashboard'}"
               class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition-colors">
              {{ item.label }}
            </a>
          }
        </div>
      </div>

      <div class="flex items-center gap-4">
        <!-- Notifications -->
        <div class="relative">
          <button (click)="showNotifications = !showNotifications; showUserMenu = false" 
                  class="p-2 text-gray-400 hover:text-blue-600 transition relative">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
            <span *ngIf="unreadNotifications > 0" class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[18px] text-center border-2 border-white">
              {{ unreadNotifications }}
            </span>
          </button>
          <app-notification-list *ngIf="showNotifications"></app-notification-list>
        </div>

        <!-- User Profile Dropdown -->
        <div class="relative ml-3">
          <div class="flex items-center gap-3">
             <span class="hidden md:block text-sm font-bold text-gray-700">{{ userName }}</span>
             <button (click)="showUserMenu = !showUserMenu; showNotifications = false" 
                     class="flex text-sm border-2 border-transparent rounded-full focus:outline-none focus:border-blue-300 transition">
                <div class="h-10 w-10 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-bold shadow-md">
                   {{ userName[0] }}
                </div>
             </button>
          </div>

          <!-- Dropdown menu -->
          @if (showUserMenu) {
            <div class="origin-top-right absolute right-0 mt-2 w-48 rounded-2xl shadow-xl py-1 bg-white ring-1 ring-black ring-opacity-5 focus:outline-none border border-gray-100 z-50">
              <a routerLink="/employe/profil" (click)="showUserMenu = false" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Mon Profil</a>
              <button (click)="logout()" class="w-full text-left block px-4 py-2 text-sm text-red-600 hover:bg-red-50">Déconnexion</button>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</nav>
