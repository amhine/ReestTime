<div class="absolute right-0 mt-2 w-80 bg-white rounded-xl shadow-2xl border border-gray-100 overflow-hidden z-50">
  <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
    <h3 class="font-bold text-gray-800">Notifications</h3>
    <span class="bg-blue-100 text-blue-600 text-xs font-bold px-2 py-1 rounded-full">
      {{ notifications.length }}
    </span>
  </div>
  <div class="max-h-96 overflow-y-auto">
    <div *ngIf="notifications.length === 0" class="p-8 text-center text-gray-400">
      <p class="text-sm">Pas de nouvelles notifications</p>
    </div>
    <div *ngFor="let notification of notifications" 
         (click)="markAsRead(notification.id)"
         class="p-4 border-b border-gray-50 hover:bg-blue-50 cursor-pointer transition">
      <p class="text-sm font-semibold text-gray-800">{{ notification.titre }}</p>
      <p class="text-xs text-gray-500 mt-1">{{ notification.message }}</p>
      <p class="text-[10px] text-gray-400 mt-2 italic">{{ notification.dateEnvoi | date:'short' }}</p>
    </div>
  </div>
</div>
