<div class="flex min-h-screen bg-gray-100">
  <app-sidebar [menuItems]="menuItems" title="RestTime"></app-sidebar>
  <main class="flex-1 ml-64">
    <header class="bg-white h-16 border-b border-gray-100 flex items-center justify-end px-8 sticky top-0 z-40">
      <div class="relative">
        <button (click)="showNotifications = !showNotifications" 
                class="p-2 text-gray-400 hover:text-blue-600 transition relative">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
          </svg>
          <span *ngIf="unreadCount > 0" class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[18px] text-center border-2 border-white">
            {{ unreadCount }}
          </span>
        </button>
        <app-notification-list *ngIf="showNotifications"></app-notification-list>
      </div>
    </header>
    <div class="p-8">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
