<div class="max-w-6xl mx-auto space-y-8 pb-12">
  <div class="flex justify-between items-center px-4 md:px-0">
    <h1 class="text-3xl font-extrabold text-gray-900">Annonces Entreprise</h1>
    <button (click)="openCreateModal()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all">
      Nouvelle annonce
    </button>
  </div>

  @if (isLoading) {
    <div class="flex justify-center py-20"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div></div>
  } @else {
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="divide-y divide-gray-100">
        @for (annonce of announcements; track annonce.id) {
          <div class="p-6 relative group hover:bg-gray-50/50 transition-colors">
            <div class="absolute top-6 right-6 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
              <button (click)="openEditModal(annonce)" class="p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
              </button>
              <button (click)="deleteAnnouncement(annonce.id)" class="p-2 text-rose-600 hover:bg-rose-50 rounded-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
              </button>
            </div>
            <h4 class="text-xl font-bold text-gray-900">{{ annonce.titre }}</h4>
            <p class="text-gray-400 text-xs mb-2">Le {{ annonce.dateCreation | date:'medium' }}</p>
            <p class="text-gray-600">{{ annonce.contenu }}</p>
          </div>
        }
      </div>
    </div>
  }

  <!-- Modal -->
  @if (showModal) {
    <div class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50">
      <div class="bg-white rounded-3xl w-full max-w-2xl p-8">
        <h3 class="text-2xl font-bold mb-6">{{ isEditing ? 'Modifier' : 'Nouvelle' }} Annonce</h3>
        <form [formGroup]="announcementForm" (ngSubmit)="onSubmit()" class="space-y-4">
          <input type="text" formControlName="titre" placeholder="Titre" class="w-full p-4 bg-gray-50 border rounded-xl">
          <textarea formControlName="contenu" rows="6" placeholder="Message" class="w-full p-4 bg-gray-50 border rounded-xl"></textarea>
          <div class="flex justify-end gap-3 mt-6">
            <button type="button" (click)="closeModal()" class="px-6 py-2 border rounded-xl">Annuler</button>
            <button type="submit" [disabled]="isSubmitting || announcementForm.invalid" class="px-6 py-2 bg-indigo-600 text-white rounded-xl">
              {{ isSubmitting ? 'Envoi...' : 'Enregistrer' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
