<div class="min-h-screen flex items-center justify-center bg-white p-6">
  <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-100">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">Récupération</h1>
      <p class="text-gray-500 mt-2">Saisissez votre email pour réinitialiser votre mot de passe</p>
    </div>

    <div *ngIf="message" class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-6 text-sm">
      {{ message }}
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" *ngIf="!message">
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
        <input type="email" formControlName="email" 
               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
               placeholder="votre@email.com">
      </div>

      <button type="submit" [disabled]="forgotForm.invalid || isLoading"
              class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition disabled:opacity-50">
        {{ isLoading ? 'Envoi en cours...' : 'Envoyer le lien' }}
      </button>
    </form>

    <div class="mt-6 text-center">
      <a routerLink="/login" class="text-sm text-blue-600 hover:underline">Retour à la connexion</a>
    </div>
  </div>
</div>
