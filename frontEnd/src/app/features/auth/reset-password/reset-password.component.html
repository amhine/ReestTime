<div class="min-h-screen flex items-center justify-center bg-white p-6">
  <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-100">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">Nouveau mot de passe</h1>
      <p class="text-gray-500 mt-2">Choisissez votre nouveau mot de passe</p>
    </div>

    <div *ngIf="error" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6 text-sm">
      {{ error }}
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" *ngIf="!success">
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">Nouveau mot de passe</label>
        <input type="password" formControlName="nouveauMotDePasse" 
               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
               placeholder="••••••••">
      </div>

      <button type="submit" [disabled]="resetForm.invalid || isLoading"
              class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition disabled:opacity-50">
        {{ isLoading ? 'Mise à jour...' : 'Réinitialiser' }}
      </button>
    </form>

    <div *ngIf="success" class="text-center">
      <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-6 text-sm">
        Mot de passe réinitialisé avec succès !
      </div>
      <a routerLink="/login" class="inline-block bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition">
        Se connecter
      </a>
    </div>
  </div>
</div>
